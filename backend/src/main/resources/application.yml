server:
  port: 8082

spring:
  web:
    error:
      include-message: always
      include-binding-errors: always
  servlet:
    multipart:
      # Domyślny 1MB odrzucałby zdjęcia wielkości własnych seedów (turkey.gif ~1.1MB).
      max-file-size: 10MB
      max-request-size: 15MB
  datasource:
    url: jdbc:postgresql://${HOST}:${DB_PORT}/shop
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    # Bez baseline-on-migrate: V1 tworzy cały schemat, więc na niepustej bazie
    # bez historii Flyway ma głośno failować, a nie po cichu pomijać V1.
    locations: classpath:db/migration
  jpa:
    show-sql: false
  data:
    web:
      pageable:
        default-page-size: 25
        max-page-size: 100
  mail:
    host: ssl0.ovh.net
    username: postmaster@dudios.pl
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        transport:
          protocol: smtp
        smtp:
          port: 587
          auth: true
          starttls:
            enable: true
            required: true

logging:
  level:
    org.springframework.web: INFO

jwt:
  expirationTime: 2592000000
  secret: ${JWT_SECRET}

app:
  serviceAddress: https://shop.dudios.pl

management:
  health:
    mail:
      # Health (i healthcheck Dockera) nie może zależeć od zewnętrznego SMTP —
      # indicator poczty robi prawdziwy Transport.connect() przy każdym odpytaniu.
      enabled: false
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics,loggers
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  info:
    env:
      enabled: false
    build:
      enabled: true
    java:
      enabled: false
    os:
      enabled: false
