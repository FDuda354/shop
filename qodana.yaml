#-------------------------------------------------------------------------------#
#               Qodana analysis is configured by qodana.yaml file               #
#             https://www.jetbrains.com/help/qodana/qodana-yaml.html            #
#-------------------------------------------------------------------------------#
# Ten plik jest JEDYNYM aktywnym źródłem konfiguracji Qodany dla shop.
# Globalne konfiguracje (repo qodana-global-configs) wymagają planu Qodana
# Ultimate Plus — na naszym planie Ultimate skan ich NIE ładuje.
#-------------------------------------------------------------------------------#
version: "1.0"
linter: jetbrains/qodana-jvm:latest
projectJDK: "25"

# Pokrycie: total >= 60% (failureConditions), bez szumu per klasa/metoda.
# Próg trzyma się grzechotki z backend/build.gradle.kts (minimum = 0.60).
# JvmCoverageInspection musi zostać WŁĄCZONA (liczy statystykę total dla
# Qodana Cloud i bramy testCoverageThresholds) — wyciszamy ją wyzerowanymi
# progami, NIE przez exclude (exclude = "Code coverage: Not set").
profile:
  base:
    name: qodana.starter
  inspections:
    - inspection: JvmCoverageInspection
      options:
        classThreshold: 0
        methodThreshold: 0
        warnMissingCoverage: false

exclude:
  - name: All
    paths:
      - frontend
      - backend/build
      # Migracje (SQL-owe i javowe seedy) to dane, nie logika do analizy.
      - backend/src/main/resources/db/migration
      - backend/src/main/java/db/migration
  # False positives: wartości to placeholdery ${ENV_VAR} albo dane testowe
  # (Testcontainers), nie prawdziwe sekrety.
  - name: HardcodedPasswords
    paths:
      - backend/src/main/resources/application.yml
      - backend/src/test/resources/application-test.yml

failureConditions:
  testCoverageThresholds:
    total: 60
